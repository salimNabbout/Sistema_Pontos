<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Sistema de Pontos</title>
  <style>
    :root{
      --bg:#f4f6f8;--card:#fff;--text:#222;--muted:#555;--line:#ddd;
      --box:#eef2f5;--alert:#fff3cd;--manual:#fff8e1;--shadow:rgba(0,0,0,.12);
      --primary:#007bff;--primary-hover:#0056b3;--success:#198754;--danger:#dc3545;--warning:#ff9800;
    }
    body.dark{
      --bg:#111827;--card:#1f2937;--text:#f9fafb;--muted:#d1d5db;--line:#374151;
      --box:#263244;--alert:#3b3420;--manual:#3d3218;--shadow:rgba(0,0,0,.45);
      --primary:#3b82f6;--primary-hover:#2563eb;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;
    }
    body{font-family:Arial,sans-serif;background:var(--bg);margin:0;padding:32px;color:var(--text);transition:.2s}
    .container{max-width:1000px;margin:auto;background:var(--card);padding:28px;border-radius:14px;box-shadow:0 0 14px var(--shadow)}
    .topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
    .theme-toggle{background:var(--success)}
    h1{text-align:center;margin:0 0 22px} h2{margin-top:32px;border-top:1px solid var(--line);padding-top:22px}
    label{font-weight:bold;display:block;margin-top:10px} input,select,textarea{width:100%;padding:10px;margin:7px 0 12px;box-sizing:border-box;font-size:15px;border:1px solid var(--line);border-radius:6px;background:var(--card);color:var(--text)}
    textarea{min-height:80px}.botoes{display:flex;gap:10px;flex-wrap:wrap}.botoes button{flex:1;min-width:150px}
    button{background:var(--primary);color:#fff;border:0;border-radius:8px;padding:12px 16px;cursor:pointer;font-size:15px;margin:4px 0}button:hover{background:var(--primary-hover)}button:disabled{background:#777;cursor:not-allowed}
    .danger{background:var(--danger)}.okbtn{background:var(--success)}.warn{background:var(--warning);color:#111}
    .box{background:var(--box);border-left:5px solid var(--primary);padding:12px;border-radius:8px;margin:10px 0}.manual{background:var(--manual);border-left-color:var(--warning)}
    .alerta{background:var(--alert);border-left:5px solid #ffc107;padding:12px;border-radius:8px;margin:12px 0}.ok{color:var(--success);font-weight:bold}.erro{color:var(--danger);font-weight:bold}.admin-only{display:none}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}.card{background:var(--box);border-left:5px solid var(--success);border-radius:10px;padding:14px}.card strong{font-size:24px;display:block;color:var(--text)}
    a{color:var(--primary)}
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div><strong>Sistema CETEM</strong></div>
    <button class="theme-toggle" onclick="trocarTema()" id="btn_tema">🌙 Modo escuro</button>
  </div>
  <h1>Sistema de Pontos</h1>

  <label>Colaborador</label>
  <select id="colaborador_id" onchange="atualizarProximoPonto()"></select>
  <div class="box" id="proximo">Próximo ponto permitido: carregando...</div>
  <div class="botoes">
    <button id="btn_entrada" onclick="baterPonto('entrada')">Entrada</button>
    <button id="btn_saida_almoco" onclick="baterPonto('saida_almoco')">Saída Almoço</button>
    <button id="btn_retorno_almoco" onclick="baterPonto('retorno_almoco')">Retorno Almoço</button>
    <button id="btn_saida" onclick="baterPonto('saida')">Saída</button>
  </div>
  <p id="status"></p>

  <h2>Acesso Administrativo</h2>
  <label>Senha Admin/RH</label>
  <input id="senha_admin" type="password" placeholder="Senha administrativa" />
  <button onclick="entrarAdmin()">Entrar como Admin</button>
  <button class="danger" onclick="sairAdmin()">Sair do modo Admin</button>
  <div id="status_admin" class="alerta">Modo admin bloqueado.</div>

  <section class="admin-only">
    <h2>Dashboard do Dia</h2>
    <label>Data</label><input type="date" id="dashboard_data" />
    <button onclick="carregarDashboard()">Atualizar Dashboard</button>
    <div id="dashboard"></div>
  </section>

  <section class="admin-only">
    <h2>Cadastrar Colaborador</h2>
    <label>Nome</label><input id="novo_nome" />
    <label>E-mail</label><input id="novo_email" />
    <label>Matrícula</label><input id="nova_matricula" />
    <button onclick="cadastrarColaborador()">Cadastrar</button>
  </section>

  <section class="admin-only">
    <h2>Gestão de Colaboradores</h2>
    <button onclick="carregarGestao()">Atualizar Lista</button>
    <div id="gestao"></div>
  </section>

  <section class="admin-only">
    <h2>Ajuste Manual de Ponto</h2>
    <div class="alerta">Use para corrigir batidas esquecidas. Todo ajuste fica auditado.</div>
    <label>Colaborador</label><select id="ajuste_colaborador_id"></select>
    <label>Tipo</label><select id="ajuste_tipo"><option value="entrada">Entrada</option><option value="saida_almoco">Saída Almoço</option><option value="retorno_almoco">Retorno Almoço</option><option value="saida">Saída</option></select>
    <label>Data e hora</label><input type="datetime-local" id="ajuste_data_hora" />
    <label>Justificativa</label><textarea id="ajuste_justificativa"></textarea>
    <button class="warn" onclick="registrarAjuste()">Registrar Ajuste Manual</button>
    <div id="resultado_ajuste"></div>
  </section>

  <section class="admin-only">
    <h2>Relatório RH</h2>
    <label>Colaborador</label><select id="relatorio_colaborador_id"><option value="todos">Todos</option></select>
    <label>Data inicial</label><input type="date" id="data_inicio" />
    <label>Data final</label><input type="date" id="data_fim" />
    <button onclick="gerarRelatorio()">Gerar Relatório</button>
    <button class="okbtn" onclick="exportarCSV()">Exportar CSV</button>
    <div id="relatorio"></div>
  </section>

  <h2>Histórico</h2>
  <button onclick="carregarHistorico()">Atualizar Histórico</button>
  <div id="historico"></div>
</div>
<script>
const API_URL='http://127.0.0.1:8000';
let admin=false, adminPassword='', proximoTipo=null, colaboradores=[], registrosRelatorio=[];
const nomes={entrada:'Entrada',saida_almoco:'Saída Almoço',retorno_almoco:'Retorno Almoço',saida:'Saída'};
function aplicarTema(tema){document.body.classList.toggle('dark',tema==='dark');localStorage.setItem('tema_ponto',tema);document.getElementById('btn_tema').innerText=tema==='dark'?'☀️ Modo claro':'🌙 Modo escuro'}
function trocarTema(){aplicarTema(document.body.classList.contains('dark')?'light':'dark')}
function status(msg,t='ok'){document.getElementById('status').innerHTML=`<span class="${t==='erro'?'erro':'ok'}">${msg}</span>`}
function fmtTipo(t){return nomes[t]||t||'-'}
function fmtData(d){return d?new Date(d).toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo'}):'-'}
function hoje(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function nomeColab(id){const c=colaboradores.find(x=>x.id===id);return c?c.nome:id}
function setAdmin(){document.querySelectorAll('.admin-only').forEach(e=>e.style.display=admin?'block':'none');document.getElementById('status_admin').innerText=admin?'Modo admin liberado.':'Modo admin bloqueado.'}
function botoes(t){['entrada','saida_almoco','retorno_almoco','saida'].forEach(x=>document.getElementById('btn_'+x).disabled=x!==t)}
async function carregarColaboradores(){const url=admin?`${API_URL}/colaboradores?admin_password=${encodeURIComponent(adminPassword)}`:`${API_URL}/colaboradores?apenas_ativos=true`;const r=await fetch(url);const d=await r.json();colaboradores=d.colaboradores||[];const ativos=colaboradores.filter(c=>c.ativo);preenche('colaborador_id',ativos,false);preenche('ajuste_colaborador_id',colaboradores,true);preencheRelatorio();}
function preenche(id,lista,vazio){const s=document.getElementById(id);s.innerHTML=vazio?'<option value="">Selecione</option>':'';lista.forEach(c=>s.innerHTML+=`<option value="${c.id}">${c.nome} - Matrícula ${c.matricula||'-'} ${c.ativo===false?'(Inativo)':''}</option>`)}
function preencheRelatorio(){const s=document.getElementById('relatorio_colaborador_id');s.innerHTML='<option value="todos">Todos</option>';colaboradores.forEach(c=>s.innerHTML+=`<option value="${c.id}">${c.nome}</option>`)}
async function atualizarProximoPonto(){const id=document.getElementById('colaborador_id').value;if(!id){botoes(null);return}const r=await fetch(`${API_URL}/proximo-ponto?colaborador_id=${id}`);const d=await r.json();proximoTipo=d.proximo_tipo_permitido;document.getElementById('proximo').innerText='Próximo ponto permitido: '+fmtTipo(proximoTipo);botoes(proximoTipo)}
async function baterPonto(tipo){const id=document.getElementById('colaborador_id').value;if(!id)return status('Selecione um colaborador.','erro');const r=await fetch(`${API_URL}/bater-ponto?colaborador_id=${id}&tipo=${tipo}`,{method:'POST'});const d=await r.json();if(d.erro)return status('Erro: '+d.erro,'erro');status('Ponto registrado: '+fmtTipo(tipo));await atualizarProximoPonto();await carregarHistorico();if(admin)await carregarDashboard()}
async function entrarAdmin(){const senha=document.getElementById('senha_admin').value;if(!senha)return status('Digite a senha.','erro');const r=await fetch(`${API_URL}/admin/validar?admin_password=${encodeURIComponent(senha)}`);const d=await r.json();if(!d.autorizado){admin=false;adminPassword='';setAdmin();return status('Senha inválida.','erro')}admin=true;adminPassword=senha;setAdmin();await carregarColaboradores();await carregarGestao();await carregarDashboard();status('Acesso admin liberado.')}
function sairAdmin(){admin=false;adminPassword='';setAdmin();status('Modo admin encerrado.');carregarColaboradores()}
async function carregarDashboard(){if(!admin)return;const data=document.getElementById('dashboard_data').value||hoje();const r=await fetch(`${API_URL}/dashboard-dia?data=${data}&admin_password=${encodeURIComponent(adminPassword)}`);const d=await r.json();if(d.erro)return document.getElementById('dashboard').innerHTML=`<p class="erro">${d.erro}</p>`;document.getElementById('dashboard').innerHTML=`<div class="cards"><div class="card">Ativos<strong>${d.total_colaboradores_ativos}</strong></div><div class="card">Registros<strong>${d.total_registros_dia}</strong></div><div class="card">Ajustes<strong>${d.total_ajustes_manuais}</strong></div><div class="card">Com entrada<strong>${d.total_com_entrada}</strong></div><div class="card">Sem entrada<strong>${d.total_sem_entrada}</strong></div></div><h3>Sem entrada</h3>${(d.colaboradores_sem_entrada||[]).map(c=>`<div class="box">${c.nome} - Matrícula ${c.matricula||'-'}</div>`).join('')||'<p>Todos com entrada.</p>'}`}
async function cadastrarColaborador(){const nome=document.getElementById('novo_nome').value.trim();if(!nome)return status('Informe o nome.','erro');const email=document.getElementById('novo_email').value.trim(),mat=document.getElementById('nova_matricula').value.trim();const r=await fetch(`${API_URL}/colaboradores?nome=${encodeURIComponent(nome)}&email=${encodeURIComponent(email)}&matricula=${encodeURIComponent(mat)}&admin_password=${encodeURIComponent(adminPassword)}`,{method:'POST'});const d=await r.json();if(d.erro)return status(d.erro,'erro');status('Colaborador cadastrado.');await carregarColaboradores();await carregarGestao();}
async function carregarGestao(){if(!admin)return;const r=await fetch(`${API_URL}/colaboradores?admin_password=${encodeURIComponent(adminPassword)}`);const d=await r.json();document.getElementById('gestao').innerHTML=(d.colaboradores||[]).map(c=>`<div class="box"><b>${c.nome}</b><br>Email: ${c.email||'-'}<br>Matrícula: ${c.matricula||'-'}<br>ID: ${c.id}<br>Status: ${c.ativo?'Ativo':'Inativo'}<br>${c.ativo?`<button class="danger" onclick="inativar('${c.id}')">Inativar</button>`:`<button class="okbtn" onclick="ativar('${c.id}')">Ativar</button>`}</div>`).join('')}
async function inativar(id){await fetch(`${API_URL}/colaboradores/inativar?colaborador_id=${id}&admin_password=${encodeURIComponent(adminPassword)}`,{method:'PUT'});await carregarColaboradores();await carregarGestao();}
async function ativar(id){await fetch(`${API_URL}/colaboradores/ativar?colaborador_id=${id}&admin_password=${encodeURIComponent(adminPassword)}`,{method:'PUT'});await carregarColaboradores();await carregarGestao();}
async function registrarAjuste(){const id=document.getElementById('ajuste_colaborador_id').value,tipo=document.getElementById('ajuste_tipo').value,dh=document.getElementById('ajuste_data_hora').value,just=document.getElementById('ajuste_justificativa').value.trim();if(!id||!dh||just.length<5)return status('Preencha colaborador, data/hora e justificativa.','erro');const r=await fetch(`${API_URL}/ajuste-manual-ponto?colaborador_id=${id}&tipo=${tipo}&data_hora=${encodeURIComponent(dh+':00')}&justificativa=${encodeURIComponent(just)}&admin_password=${encodeURIComponent(adminPassword)}`,{method:'POST'});const d=await r.json();if(d.erro)return status(d.erro,'erro');document.getElementById('resultado_ajuste').innerHTML='<div class="box manual">Ajuste manual registrado.</div>';await carregarHistorico();await carregarDashboard();}
async function carregarHistorico(){const r=await fetch(`${API_URL}/registros-ponto`);const d=await r.json();document.getElementById('historico').innerHTML=(d.registros||[]).map(x=>`<div class="box ${x.manual?'manual':''}"><b>${fmtTipo(x.tipo)} ${x.manual?' - AJUSTE MANUAL':''}</b><br>Colaborador: ${nomeColab(x.colaborador_id)}<br>Data/Hora: ${fmtData(x.created_at)}<br>Criado por: ${x.criado_por||'-'}<br>${x.justificativa?`Justificativa: ${x.justificativa}`:''}</div>`).join('')||'<p>Nenhum registro.</p>'}
async function gerarRelatorio(){const c=document.getElementById('relatorio_colaborador_id').value,ini=document.getElementById('data_inicio').value,fim=document.getElementById('data_fim').value;const r=await fetch(`${API_URL}/relatorio-ponto?colaborador_id=${c}&data_inicio=${ini}&data_fim=${fim}&admin_password=${encodeURIComponent(adminPassword)}`);const d=await r.json();registrosRelatorio=d.registros||[];document.getElementById('relatorio').innerHTML=`<p>Total: ${d.total_registros||0}</p>`+registrosRelatorio.map(x=>`<div class="box ${x.manual?'manual':''}">${nomeColab(x.colaborador_id)} - ${fmtTipo(x.tipo)} - ${fmtData(x.created_at)} - ${x.criado_por||'-'}</div>`).join('')}
function exportarCSV(){if(!registrosRelatorio.length)return status('Nenhum registro para exportar.','erro');const linhas=[['Colaborador','Tipo','Data/Hora','Manual','Justificativa','Criado por'],...registrosRelatorio.map(x=>[nomeColab(x.colaborador_id),fmtTipo(x.tipo),fmtData(x.created_at),x.manual?'Sim':'Não',x.justificativa||'',x.criado_por||''])];const csv=linhas.map(l=>l.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='relatorio_ponto.csv';a.click();}
async function iniciar(){aplicarTema(localStorage.getItem('tema_ponto')||'light');const h=hoje();['dashboard_data','data_inicio','data_fim'].forEach(id=>document.getElementById(id).value=h);document.getElementById('ajuste_data_hora').value=h+'T08:00';setAdmin();await carregarColaboradores();await atualizarProximoPonto();await carregarHistorico()}
iniciar();
</script>
</body>
</html>
